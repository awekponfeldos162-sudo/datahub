<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DATAhub - Centralisez l'analyse de vos réseaux sociaux en un seul endroit" />
    <meta name="theme-color" content="#1e3a5f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>DATAhub — Analyse Multi-Réseaux Sociaux</title>

    <!-- Apply dark mode immediately from localStorage to prevent flash of wrong theme -->
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('datahub-ui') || '{}');
          if (stored.state && stored.state.darkMode) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
